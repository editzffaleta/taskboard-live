name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    # Envs de CI (dummy): o postinstall roda `prisma generate`, que valida a presenca
    # de DATABASE_URL no config mas NAO conecta ao banco. Nenhum segredo real aqui.
    env:
      DATABASE_URL: postgresql://taskboard:taskboard@localhost:5432/taskboard?schema=public
      JWT_SECRET: ci-dummy-secret-nao-usado-em-producao
      JWT_EXPIRES_IN: 1d
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # gitleaks varre o histórico do repositório

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Instalar Semgrep (SAST)
        run: pipx install semgrep && semgrep --version

      - name: Instalar Trivy (vulnerabilidades)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Instalar OpenSpec CLI (validacao das changes)
        run: npm i -g @fission-ai/openspec

      - name: Instalar dependências
        run: npm ci

      - name: Rodar gate (segredos, audit, lint, typecheck, test, build, SAST, vulnerabilidades, openspec)
        run: bash scripts/ci/gate.sh
