# CI do PROPRIO template (nao confundir com o ci.yml asset que os projetos gerados recebem).
name: validar-template
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validar integridade estrutural do template
        run: bash scripts/validar-template.sh

      - name: Smoke mecanico (bootstrap deterministico dos assets)
        run: bash scripts/smoke-template.sh

