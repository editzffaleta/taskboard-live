<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<style>
:root{
--bg-app:#EEF2F8;--bg-subtle:#F5F8FC;--bg-surface:#FFFFFF;--bg-hover:#F1F5F9;--bg-sunken:#E6ECF3;
--border:#E4E9F0;--border-strong:#CFD8E3;
--text-primary:#0F172A;--text-secondary:#4A5568;--text-muted:#94A3B8;
--primary:#2563EB;--primary-hover:#1D4ED8;--primary-fg:#FFFFFF;--primary-subtle:#EFF5FF;--primary-border:#BFD5FE;
--live:#10B981;--lbl-blue-bg:#DBEAFE;--lbl-blue-fg:#1D4ED8;--lbl-teal-bg:#CCFBF1;--lbl-teal-fg:#0F766E;
--shadow-sm:0 1px 2px rgba(15,23,42,.06);--shadow-md:0 6px 16px rgba(15,23,42,.08);--shadow-lg:0 24px 56px rgba(15,23,42,.16);
}
[data-theme="dark"]{
--bg-app:#0B1220;--bg-subtle:#111A2B;--bg-surface:#162033;--bg-hover:#1C2942;--bg-sunken:#0E1626;
--border:#233149;--border-strong:#32445F;
--text-primary:#ECF1F8;--text-secondary:#A3B2C7;--text-muted:#64748B;
--primary:#3B82F6;--primary-hover:#60A5FA;--primary-fg:#FFFFFF;--primary-subtle:rgba(59,130,246,.14);--primary-border:rgba(59,130,246,.4);
--live:#34D399;--lbl-blue-bg:rgba(59,130,246,.22);--lbl-blue-fg:#93C5FD;--lbl-teal-bg:rgba(20,184,166,.22);--lbl-teal-fg:#5EEAD4;
--shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 4px 14px rgba(0,0,0,.4);--shadow-lg:0 28px 64px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
a{color:var(--primary);text-decoration:none;}
.ms{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;display:inline-block;white-space:nowrap;direction:ltr;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;}
.mono{font-family:'JetBrains Mono',monospace;}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(4deg);}50%{transform:translateY(-6px) rotate(4deg);}}
</style>
</helmet>
<div ref="{{ rootRef }}" data-theme="{{ theme }}" style="min-height:100vh;background:var(--bg-app);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;">
  <div style="height:64px;display:flex;align-items:center;padding:0 28px;">
    <div style="display:flex;align-items:center;gap:10px;"><span style="display:inline-flex;gap:3px;align-items:flex-end;height:22px;"><span style="width:5px;height:14px;background:var(--primary);border-radius:2px;"></span><span style="width:5px;height:22px;background:var(--primary);border-radius:2px;"></span><span style="width:5px;height:10px;background:#60A5FA;border-radius:2px;"></span></span><span style="font-size:16px;font-weight:700;letter-spacing:-.02em;">TaskBoard <span style="color:var(--primary);">Live</span></span></div>
    <div style="flex:1;"></div>
    <a href="#" style="font-size:13px;font-weight:600;color:var(--text-muted);margin-right:14px;">Pular introdução</a>
    <button onClick="{{ toggleTheme }}" title="Alternar tema" style="width:38px;height:38px;border:1px solid var(--border);border-radius:9px;background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;" style-hover="background:var(--bg-hover);color:var(--text-primary);"><span class="ms" style="font-size:19px;">{{ themeIcon }}</span></button>
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px 20px 50px;">
    <div style="width:min(560px,100%);background:var(--bg-surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);">

      <div style="height:5px;background:var(--bg-sunken);"><div style="height:100%;width:{{ progress }};background:var(--primary);border-radius:0 3px 3px 0;transition:width .3s cubic-bezier(.2,.8,.2,1);"></div></div>

      <div style="height:220px;background:var(--bg-subtle);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
        <sc-if value="{{ isStep1 }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="width:96px;background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:9px;box-shadow:var(--shadow-sm);"><div style="height:8px;width:60%;background:var(--text-muted);opacity:.4;border-radius:2px;margin-bottom:9px;"></div><div style="height:34px;background:var(--bg-subtle);border-radius:7px;margin-bottom:6px;"></div><div style="height:26px;background:var(--bg-subtle);border-radius:7px;"></div></div>
            <div style="width:96px;background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:9px;box-shadow:var(--shadow-sm);"><div style="height:8px;width:70%;background:var(--text-muted);opacity:.4;border-radius:2px;margin-bottom:9px;"></div><div style="height:30px;background:var(--bg-subtle);border-radius:7px;"></div></div>
            <div style="width:96px;border:2px dashed var(--primary);border-radius:11px;padding:9px;display:flex;align-items:center;justify-content:center;height:90px;background:var(--primary-subtle);"><span class="ms" style="font-size:28px;color:var(--primary);">add</span></div>
          </div>
        </sc-if>
        <sc-if value="{{ isStep2 }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;align-items:center;gap:-10px;">
            <span style="width:56px;height:56px;border-radius:50%;background:#7C3AED;color:#fff;font-size:18px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;border:4px solid var(--bg-subtle);">AC</span>
            <span style="width:56px;height:56px;border-radius:50%;background:#059669;color:#fff;font-size:18px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;border:4px solid var(--bg-subtle);margin-left:-16px;">RO</span>
            <span style="width:56px;height:56px;border-radius:50%;background:#E11D48;color:#fff;font-size:18px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;border:4px solid var(--bg-subtle);margin-left:-16px;">MS</span>
            <span style="width:56px;height:56px;border-radius:50%;background:var(--primary-subtle);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;border:2px dashed var(--primary);margin-left:-16px;"><span class="ms" style="font-size:26px;">person_add</span></span>
          </div>
        </sc-if>
        <sc-if value="{{ isStep3 }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;gap:14px;align-items:flex-start;position:relative;">
            <div style="width:120px;background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:9px;box-shadow:var(--shadow-sm);"><div style="height:8px;width:50%;background:var(--text-muted);opacity:.4;border-radius:2px;margin-bottom:9px;"></div><div style="border:2px dashed var(--primary);border-radius:8px;height:44px;background:var(--primary-subtle);"></div></div>
            <div style="width:120px;background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:9px;box-shadow:var(--shadow-sm);"><div style="height:8px;width:60%;background:var(--text-muted);opacity:.4;border-radius:2px;margin-bottom:9px;"></div><div style="height:36px;background:var(--bg-subtle);border-radius:8px;"></div></div>
            <div style="position:absolute;left:44px;top:34px;width:110px;background:var(--bg-surface);border:1px solid var(--primary);border-radius:9px;padding:9px 10px;box-shadow:var(--shadow-md);animation:floaty 2.6s ease-in-out infinite;"><span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--lbl-teal-bg);color:var(--lbl-teal-fg);">Backend</span><div style="height:7px;width:80%;background:var(--text-muted);opacity:.4;border-radius:2px;margin-top:7px;"></div></div>
          </div>
        </sc-if>
      </div>

      <div style="padding:26px 30px 24px;text-align:center;">
        <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--primary);margin-bottom:10px;">Passo {{ step }} de 3</div>
        <h1 style="margin:0 0 10px;font-size:23px;font-weight:800;letter-spacing:-.02em;">{{ stepTitle }}</h1>
        <p style="margin:0 auto 20px;max-width:400px;font-size:14.5px;line-height:1.6;color:var(--text-secondary);">{{ stepText }}</p>

        <sc-if value="{{ isStep1 }}" hint-placeholder-val="{{ true }}">
          <div style="max-width:360px;margin:0 auto;"><input value="Sprint 43 · Produto" style="width:100%;height:46px;padding:0 14px;border:1px solid var(--primary);border-radius:11px;background:var(--bg-surface);color:var(--text-primary);font-size:14.5px;font-family:'Inter';outline:none;box-shadow:0 0 0 3px var(--primary-subtle);text-align:center;"></div>
        </sc-if>
        <sc-if value="{{ isStep2 }}" hint-placeholder-val="{{ false }}">
          <div style="max-width:400px;margin:0 auto;display:flex;gap:8px;"><input placeholder="colega@empresa.com" style="flex:1;height:46px;padding:0 14px;border:1px solid var(--border);border-radius:11px;background:var(--bg-subtle);color:var(--text-primary);font-size:14px;font-family:'Inter';outline:none;" style-focus="border-color:var(--primary);background:var(--bg-surface);"><button style="height:46px;padding:0 16px;border:none;border-radius:11px;background:var(--primary-subtle);color:var(--primary);font-size:13.5px;font-weight:600;cursor:pointer;">Adicionar</button></div>
        </sc-if>
      </div>

      <div style="display:flex;align-items:center;gap:12px;padding:0 30px 26px;">
        <sc-if value="{{ canBack }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ back }}" style="height:44px;padding:0 18px;border:1px solid var(--border);border-radius:11px;background:var(--bg-surface);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;" style-hover="background:var(--bg-hover);">Voltar</button>
        </sc-if>
        <div style="flex:1;display:flex;gap:7px;justify-content:center;">
          <span style="width:{{ dot1w }};height:8px;border-radius:20px;background:{{ dot1 }};transition:all .3s;"></span>
          <span style="width:{{ dot2w }};height:8px;border-radius:20px;background:{{ dot2 }};transition:all .3s;"></span>
          <span style="width:{{ dot3w }};height:8px;border-radius:20px;background:{{ dot3 }};transition:all .3s;"></span>
        </div>
        <button onClick="{{ next }}" style="height:44px;padding:0 22px;border:none;border-radius:11px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm);display:inline-flex;align-items:center;gap:7px;" style-hover="background:var(--primary-hover);">{{ nextLabel }}<span class="ms" style="font-size:19px;">{{ nextIcon }}</span></button>
      </div>
    </div>
  </div>
</div>

<dc-import name="ScreenNav" style="position:fixed;left:0;top:0;width:0;height:0;" hint-size="1px,1px"></dc-import></x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;temaInicial&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;claro&quot;, &quot;escuro&quot;], &quot;default&quot;: &quot;claro&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Aparência&quot; },
  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2563EB&quot;, &quot;options&quot;: [&quot;#2563EB&quot;, &quot;#7C3AED&quot;, &quot;#0891B2&quot;, &quot;#059669&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Aparência&quot; }
}">
class Component extends DCLogic {
  rootRef = React.createRef();
  state = { theme: (this.props && this.props.temaInicial === 'escuro') ? 'dark' : 'light', step: 1 };
  componentDidMount() { this.applyAccent(); }
  componentDidUpdate(prev) { if (prev.accentColor !== this.props.accentColor) this.applyAccent(); }
  applyAccent() { var a = this.props && this.props.accentColor, el = this.rootRef.current; if (a && el) { el.style.setProperty('--primary', a); el.style.setProperty('--primary-hover', a); } }
  renderVals() {
    const s = this.state;
    const titles = { 1: 'Crie seu primeiro quadro', 2: 'Convide seu time', 3: 'Arraste um cartão' };
    const texts = {
      1: 'Um quadro organiza seu trabalho em listas. Dê um nome e comece — você pode mudar tudo depois.',
      2: 'O TaskBoard Live brilha em conjunto. Convide colegas por e-mail para ver os cartões se moverem ao vivo.',
      3: 'Arraste cartões entre listas para atualizar o status. Todo mundo vê a mudança na hora, em tempo real.'
    };
    const dot = (n) => s.step === n ? 'var(--primary)' : (s.step > n ? 'var(--primary)' : 'var(--bg-sunken)');
    const dotw = (n) => s.step === n ? '26px' : '8px';
    return {
      theme: s.theme,
      themeIcon: s.theme === 'dark' ? 'light_mode' : 'dark_mode',
      toggleTheme: () => this.setState(st => ({ theme: st.theme === 'dark' ? 'light' : 'dark' })),
      rootRef: this.rootRef,
      step: s.step,
      isStep1: s.step === 1, isStep2: s.step === 2, isStep3: s.step === 3,
      stepTitle: titles[s.step], stepText: texts[s.step],
      progress: (s.step / 3 * 100) + '%',
      canBack: s.step > 1,
      back: () => this.setState(st => ({ step: Math.max(1, st.step - 1) })),
      next: () => this.setState(st => ({ step: Math.min(3, st.step + 1) })),
      nextLabel: s.step < 3 ? 'Próximo' : 'Ir para meu quadro',
      nextIcon: s.step < 3 ? 'arrow_forward' : 'rocket_launch',
      dot1: dot(1), dot2: dot(2), dot3: dot(3), dot1w: dotw(1), dot2w: dotw(2), dot3w: dotw(3),
    };
  }
}
</script>
</body>
</html>
